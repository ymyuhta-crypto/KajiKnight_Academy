<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カジナイトアカデミー 鍛冶スコア計算ツール</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --card-bg: #262636;
            --primary-color: #3498db;
            --text-color: #f0f0f5;
            --border-color: #3a3a52;
            
            /* アイテム色の定義 */
            --color-red: #ff4d4d;
            --color-blue: #3399ff;
            --color-yellow: #ffcc00;
            --color-green: #2ecc71;
            --color-gold: #f1c40f;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 25px;
            color: #fff;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
        }
        .level-select {
            margin-bottom: 25px;
            padding: 15px;
            background: #1f1f2e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-color);
        }
        .level-select select {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #2c2c3e;
            color: #fff;
        }
        .slot-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #1f1f2e;
        }
        .slot-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slot-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        select, input[type="checkbox"] {
            cursor: pointer;
        }
        .slot-inputs select {
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #2c2c3e;
            color: #fff;
            font-weight: bold;
            transition: background-color 0.2s, color 0.2s;
        }
        
        /* セレクトボックスの色分け（JavaScriptでも動的に制御） */
        select.color-red { background-color: var(--color-red) !important; color: #fff !important; }
        select.color-blue { background-color: var(--color-blue) !important; color: #fff !important; }
        select.color-yellow { background-color: #b38f00 !important; color: #fff !important; } /* 視認性のため少し暗めに */
        select.color-green { background-color: var(--color-green) !important; color: #fff !important; }
        select.color-gold { background-color: var(--color-gold) !important; color: #000 !important; }

        /* プルダウンの選択肢内の色 */
        option[value="red"] { background-color: #ff4d4d; color: #fff; }
        option[value="blue"] { background-color: #3399ff; color: #fff; }
        option[value="yellow"] { background-color: #ffcc00; color: #000; }
        option[value="green"] { background-color: #2ecc71; color: #fff; }
        option[value="gold"] { background-color: #f1c40f; color: #000; }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #11111a;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .total-score {
            font-size: 42px;
            font-weight: bold;
            color: #2ecc71;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }
        .details {
            font-size: 14px;
            color: #a0a0b0;
            line-height: 1.6;
        }
        
        /* リンクエリア */
        .footer-links {
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            line-height: 1.8;
        }
        .footer-links p {
            margin: 8px 0;
        }
        .footer-links a {
            color: #3498db;
            text-decoration: none;
            word-break: break-all;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .support-link {
            background: #2c3e50;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px !important;
            border-left: 4px solid #e74c3c;
        }
        .support-link a {
            color: #ff7675;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>カジナイトアカデミー<br>鍛冶スコア計算ツール</h1>

    <div class="level-select">
        <label for="gameLevel"><strong>ゲームレベル:</strong></label>
        <select id="gameLevel" onchange="calculate()">
            <option value="初級">初級 (n=1)</option>
            <option value="三級">三級 (n=2)</option>
            <option value="二級">二級 (n=3)</option>
            <option value="一級">一級 (n=4)</option>
        </select>
    </div>

    <div class="slot-card">
        <div class="slot-title">
            <span>スロット 1</span>
            <label class="checkbox-container">
                <input type="checkbox" id="complete1" checked onchange="calculate()"> 完成
            </label>
        </div>
        <div class="slot-inputs">
            <select id="color1" onchange="updateSelectColor(1); calculate();" class="color-red">
                <option value="red">赤色</option>
                <option value="blue">青色</option>
                <option value="yellow">黄色</option>
                <option value="green">緑色</option>
                <option value="gold">金色</option>
            </select>
            <select id="type1" onchange="calculate()">
                <option value="kakashi">🌾 カカシ</option>
                <option value="ring">💍 指輪</option>
                <option value="charm">🧿 チャーム</option>
                <option value="bracelet"> 腕輪</option>
                <option value="necklace">📿 首飾り</option>
            </select>
        </div>
    </div>

    <div class="slot-card">
        <div class="slot-title">
            <span>スロット 2</span>
