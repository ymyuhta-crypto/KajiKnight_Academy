<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高度鍛冶シミュレーションシステム</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e0e0e0;
            --border-color: #2d2d35;
            --accent-color: #4a5568;
            --accent-hover: #718096;
            
            --color-red: #e53e3e;
            --color-blue: #3182ce;
            --color-yellow: #dd6b20;
            --color-green: #38a169;
            --color-gold: #d69e2e;
            --color-none: #718096;
            
            --slot1-bg: #5c007a;
            --slot-normal-bg: #1e293b;
            --ore-box-bg: #2a2a2e;
        }

        body.light-mode {
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            --accent-color: #4a5568;
            --accent-hover: #2d3748;
            --slot-normal-bg: #edf2f7;
            --ore-box-bg: #f7fafc;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        h1 {
            font-size: 20px;
            margin: 0;
            font-weight: bold;
        }

        .mode-toggle {
            padding: 6px 12px;
            font-size: 12px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
        }

        /* 展開用ボタンスタイル */
        .trigger-btn {
            display: block;
            width: 100%;
            padding: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        .trigger-btn:hover {
            background-color: var(--border-color);
        }

        .matrix-wrapper {
            display: none;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        /* 5x5 マトリクス選択スタイル */
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            background-color: var(--card-bg);
        }
        .matrix-table th, .matrix-table td {
            border: 1px solid var(--border-color);
            padding: 4px;
            text-align: center;
        }
        .matrix-table th {
            background-color: rgba(0,0,0,0.1);
            font-weight: normal;
        }
        
        /* 縦行カラー装飾 */
        .hdr-row-red { background-color: rgba(229, 62, 62, 0.15); color: var(--text-color); font-weight: bold; }
        .hdr-row-blue { background-color: rgba(49, 130, 206, 0.15); color: var(--text-color); font-weight: bold; }
        .hdr-row-yellow { background-color: rgba(221, 107, 32, 0.15); color: var(--text-color); font-weight: bold; }
        .hdr-row-green { background-color: rgba(56, 161, 105, 0.15); color: var(--text-color); font-weight: bold; }
        .hdr-row-gold { 
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%); 
            color: #000000 !important; 
            font-weight: bold; 
        }

        .matrix-cell-btn {
            width: 100%;
            padding: 6px 2px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            cursor: pointer;
            font-size: 11px;
            border-radius: 3px;
        }
        .matrix-cell-btn.active {
            font-weight: bold;
            color: #ffffff !important;
        }
        .matrix-cell-btn.active.r { background-color: var(--color-red); }
        .matrix-cell-btn.active.b { background-color: var(--color-blue); }
        .matrix-cell-btn.active.y { background-color: var(--color-yellow); }
        .matrix-cell-btn.active.g { background-color: var(--color-green); }
        .matrix-cell-btn.active.gold { background-color: var(--color-gold); color: #000000 !important; }

        .stock-input {
            width: 40px;
            text-align: center;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 3px;
            padding: 2px;
        }

        /* スロット構造 */
        .slot-container {
            background-color: var(--slot-normal-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
        }
        .slot-container.slot-1 {
            background-color: var(--slot1-bg);
            color: #ffffff !important;
        }
        /* ライトモード時のスロット1強制視認性確保 */
        body.light-mode .slot-container.slot-1 {
            color: #ffffff !important;
        }
        body.light-mode .slot-container.slot-1 .section-title {
            color: #ffffff !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
        }
        body.light-mode .slot-container.slot-1 .trigger-btn {
            background-color: rgba(255,255,255,0.1);
            color: #ffffff;
            border-color: rgba(255,255,255,0.3);
        }
        body.light-mode .slot-container.slot-1 .matrix-cell-btn {
            color: #ffffff;
        }

        .slot-layout {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .slot-main { flex: 2; }
        .slot-side {
            flex: 1;
            background: rgba(0,0,0,0.15);
            padding: 10px;
            border-radius: 4px;
            min-height: 80px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 鉱石デザイン（黒縁・ゴシック体徹底） */
        .ore-grid {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .ore-square {
            width: 34px;
            height: 34px;
            border-radius: 4px;
            border: 2px solid #000000; /* 正方形に黒い縁取り */
            background: var(--ore-box-bg);
            font-family: sans-serif; /* ゴシック体 */
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
            /* 文字に黒い縁取り */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; 
        }
        
        /* 各フォント色の対応 */
        .ore-square.ore-R { color: var(--color-red); }
        .ore-square.ore-B { color: var(--color-blue); }
        .ore-square.ore-Y { color: var(--color-yellow); }
        .ore-square.ore-G { color: var(--color-green); }

        /* 選択時（アクティブ）のシックな背景変化 */
        .ore-square.active-R { background-color: #4a1d1d; }
        .ore-square.active-B { background-color: #1a2e40; }
        .ore-square.active-Y { background-color: #4a3b1a; }
        .ore-square.active-G { background-color: #1a3a24; }
        body.light-mode .ore-square.active-R { background-color: #fed7d7; }
        body.light-mode .ore-square.active-B { background-color: #bee3f8; }
        body.light-mode .ore-square.active-Y { background-color: #feebc8; }
        body.light-mode .ore-square.active-G { background-color: #c6f6d5; }
        
        /* ALLボタン仕様：3色グラデーション、白文字ゴシック、双方に黒縁 */
        .ore-square.ore-all-style {
            background: linear-gradient(to bottom, #00ffff, #ffffff, #ff00ff);
            border: 2px solid #000000;
            color: #ffffff;
        }
        .ore-square.ore-all-style .all-text {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 10px;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .panel-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.05);
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .input-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sys-input {
            width: 80px;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-color);
            text-align: center;
        }
        .sys-select {
            width: 90px;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-color);
        }

        .action-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        .action-btn:hover { background-color: var(--accent-hover); }

        .toggle-panel-btn {
            width: 100%;
            padding: 8px;
            background: transparent;
            color: var(--text-color);
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
        }

        .results-area {
            max-height: 250px;
            overflow-y: auto;
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid var(--border-color);
        }
        .result-row-item {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .result-row-item:hover { background: rgba(0,0,0,0.05); }

        /* 訓練セクション：2行3列配置、角丸長方形 */
        .advanced-section {
            display: none;
            flex-direction: column;
            gap: 15px;
            border-top: 2px dashed var(--border-color);
            padding-top: 15px;
        }
        .training-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, auto);
            gap: 8px;
        }
        .train-block {
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px; /* 角を丸める */
            padding: 8px;
            cursor: pointer;
            min-height: 65px;
            box-sizing: border-box;
        }
        .train-block.focused {
            border: 1px solid var(--text-color);
            background: rgba(0,0,0,0.15);
        }
        .train-lbl { font-size: 11px; font-weight: bold; margin-bottom: 4px;}
        
        /* 訓練内チップ出力エリア：5つで折り返す寸法 */
        .train-val { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 3px; 
            width: 100%;
            max-width: 115px; /* 20px+3px = 23px * 5 = 115px で最適改行 */
        }

        /* 訓練文字の正方形チップデザイン（ゴシック・黒縁） */
        .train-chip {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-weight: 900;
            font-size: 12px;
            border: 1px solid #000000; /* 黒い縁取り */
            border-radius: 3px;
            background-color: #2d3748;
            box-sizing: border-box;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; /* 文字の黒縁 */
        }
        body.light-mode .train-chip { background-color: #e2e8f0; }
        
        .chip-R { color: var(--color-red); }
        .chip-B { color: var(--color-blue); }
        .chip-Y { color: var(--color-yellow); }
        .chip-G { color: var(--color-green); }
        .chip-N { color: #a0aec0; }

        /* パッドボタン */
        .pad-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(0,0,0,0.1);
            padding: 8px;
            border-radius: 4px;
        }
        .pad-line { display: flex; gap: 6px; }
        .p-btn {
            flex: 1;
            padding: 10px 0;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            cursor: pointer;
        }
        .p-btn.c-r { color: var(--color-red); }
        .p-btn.c-b { color: var(--color-blue); }
        .p-btn.c-y { color: var(--color-yellow); }
        .p-btn.c-g { color: var(--color-green); }
        .p-btn.c-n { color: #888888; }

        .flow-container {
            background: rgba(0,0,0,0.15);
            border-left: 3px solid var(--accent-color);
            padding: 10px;
            border-radius: 0 4px 4px 0;
            font-size: 11px;
            line-height: 1.5;
        }
        
        .info-text { font-size: 11px; color: #718096; line-height: 1.4; }
    </style>
</head>
<body class="dark-mode">

<div class="container">
    <div class="header-area">
        <h1>高度鍛冶シミュレーションシステム</h1>
        <button class="mode-toggle" onclick="toggleDisplayMode()">表示モード切替</button>
    </div>

    <div class="slot-container slot-1">
        <div class="slot-layout">
            <div class="slot-main">
                <div class="section-title">スロット 1</div>
                <button class="trigger-btn" onclick="toggleWrapper('slot-matrix-wrapper-1')">[ アイテムを入力 ]</button>
                <div id="slot-matrix-wrapper-1" class="matrix-wrapper">
                    <div id="slot-matrix-1"></div>
                </div>
            </div>
            <div class="slot-side">
                <div style="font-size:11px; font-weight:bold;">引き継ぎ鉱石</div>
                <div id="slot-retained-1" class="ore-grid"></div>
            </div>
        </div>
    </div>

    <div class="slot-container">
        <div class="slot-layout">
            <div class="slot-main">
                <div class="section-title">スロット 2</div>
                <button class="trigger-btn" onclick="toggleWrapper('slot-matrix-wrapper-2')">[ アイテムを入力 ]</button>
                <div id="slot-matrix-wrapper-2" class="matrix-wrapper">
                    <div id="slot-matrix-2"></div>
                </div>
            </div>
            <div class="slot-side">
                <div style="font-size:11px; font-weight:bold;">引き継ぎ鉱石</div>
                <div id="slot-retained-2" class="ore-grid"></div>
            </div>
        </div>
    </div>

    <div class="slot-container">
        <div class="slot-layout">
            <div class="slot-main">
                <div class="section-title">スロット 3</div>
                <button class="trigger-btn" onclick="toggleWrapper('slot-matrix-wrapper-3')">[ アイテムを入力 ]</button>
                <div id="slot-matrix-wrapper-3" class="matrix-wrapper">
                    <div id="slot-matrix-3"></div>
                </div>
            </div>
            <div class="slot-side">
                <div style="font-size:11px; font-weight:bold;">引き継ぎ鉱石</div>
                <div id="slot-retained-3" class="ore-grid"></div>
            </div>
        </div>
    </div>

    <div class="panel-box">
        <div class="section-title">手持ストックアイテム数量設定</div>
        <button class="trigger-btn" onclick="toggleWrapper('stock-matrix-wrapper')">[ ストック数量を入力 ]</button>
        <div id="stock-matrix-wrapper" class="matrix-wrapper">
            <div id="stock-matrix-container"></div>
        </div>
        
        <div class="control-row">
            <span>登録総数: <strong id="lbl-total-stock">0</strong> / <span id="lbl-max-stock">3</span> 枠</span>
            <button onclick="resetStockMatrix()" style="padding:2px 6px; font-size:11px; cursor:pointer;">全リセット</button>
        </div>

        <div class="input-group" style="margin-bottom:12px;">
            <div class="input-item">
                <label>現在の段位:</label>
                <select id="sys-level" onchange="processLevelTransition()" class="sys-select">
                    <option value="見習い">見習い</option><option value="三級">三級</option><option value="二級">二級</option><option value="一級">一級</option>
                </select>
            </div>
            <div class="input-item">
                <label>現在保有スコア:</label>
                <input type="number" id="sys-cur-score" value="0" min="0" class="sys-input">
            </div>
            <div class="input-item">
                <label>目標達成スコア:</label>
                <input type="number" id="sys-tar-score" value="20" min="0" class="sys-input">
            </div>
            <div style="text-align:center; font-size:11px;">
                <label><input type="checkbox" id="sys-over-score"> 目標スコア超過ルートを含める</label>
            </div>
        </div>

        <button onclick="executeStandardAnalysis()" class="action-btn" style="margin-bottom:10px;">最適手順の解析実行</button>
        <button onclick="toggleAdvancedPanel()" class="toggle-panel-btn">高度分析モード（訓練・変換シミュレーター）を展開</button>
        
        <div id="standard-results" class="results-area" style="margin-top:10px;">データを入力し、解析を実行してください。</div>
    </div>

    <div id="advanced-panel" class="panel-box advanced-section">
        <div class="section-title">高度分析シミュレーター</div>
        
        <div style="font-size:12px; font-weight:bold; margin-bottom:4px;">1. 引き継ぎ鉱石状態（上記スロット内と連動）</div>
        <div id="adv-retained-sync-area" style="background:rgba(0,0,0,0.05); padding:8px; border-radius:4px; display:flex; flex-direction:column; gap:8px;"></div>

        <div style="font-size:12px; font-weight:bold; margin-top:5px; margin-bottom:4px;">2. 6種訓練における鉱石分布入力</div>
        
        <div class="training-matrix">
            <div id="tb-0" class="train-block focused" onclick="setTrainingFocus(0)"><div class="train-lbl">持久力</div><div id="td-0" class="train-val"></div></div>
            <div id="tb-1" class="train-block" onclick="setTrainingFocus(1)"><div class="train-lbl">筋力</div><div id="td-1" class="train-val"></div></div>
            <div id="tb-2" class="train-block" onclick="setTrainingFocus(2)"><div class="train-lbl">瞬発力</div><div id="td-2" class="train-val"></div></div>
            <div id="tb-3" class="train-block" onclick="setTrainingFocus(3)"><div class="train-lbl">命中力</div><div id="td-3" class="train-val"></div></div>
            <div id="tb-4" class="train-block" onclick="setTrainingFocus(4)"><div class="train-lbl">知力</div><div id="td-4" class="train-val"></div></div>
            <div id="tb-5" class="train-block" onclick="setTrainingFocus(5)"><div class="train-lbl">精神力</div><div id="td-5" class="train-val"></div></div>
        </div>

        <div class="pad-box">
            <div class="pad-line">
                <button onclick="handlePadInput('R')" class="p-btn c-r">R</button>
                <button onclick="handlePadInput('B')" class="p-btn c-b">B</button>
                <button onclick="handlePadInput('Y')" class="p-btn c-y">Y</button>
                <button onclick="handlePadInput('G')" class="p-btn c-g">G</button>
                <button onclick="handlePadInput('N')" class="p-btn c-n">N</button>
            </div>
            <div class="pad-line">
                <button onclick="handlePadInput('DEL')" class="p-btn" style="color:var(--text-color);">1文字削除</button>
                <button onclick="handlePadInput('ENTER')" class="p-btn" style="flex:2; color:var(--text-color);">Enter (次へ進む)</button>
            </div>
        </div>

        <button onclick="executeAdvancedAnalysis()" class="action-btn" style="background-color:var(--accent-color);">精密シミュレーション実行</button>
        <div id="advanced-results" class="results-area">訓練分布を設定後、シミュレーションを実行してください。</div>
        <div id="flowchart-output"></div>
    </div>

    <div class="info-text">
        ※本システムは有志による計算結果の試算モデルです。実際のゲーム内挙動と異なる場合があります。
    </div>
</div>

<script>
const COLOR_KEYS = ['red', 'blue', 'yellow', 'green', 'gold'];
const TYPE_KEYS = ['kakashi', 'ring', 'charm', 'bracelet', 'necklace'];
const COLOR_JA = { red: '赤色', blue: '青色', yellow: '黄色', green: '緑色', gold: '金色' };
const TYPE_JA = { kakashi: 'カカシ', ring: '指輪', charm: 'チャーム', bracelet: '腕輪', necklace: '首飾り' };
const RANK_LIMITS = { '見習い': 3, '三級': 4, '二級': 5, '一級': 6 };

const RECIPES = {
    red: {
        kakashi: { R: 1, B: 0, Y: 0, G: 0, ALL: 0 },
        ring: { R: 1, B: 0, Y: 0, G: 0, ALL: 1 },
        charm: { R: 2, B: 0, Y: 0, G: 0, ALL: 1 },
        bracelet: { R: 2, B: 1, Y: 0, G: 0, ALL: 1 },
        necklace: { R: 4, B: 0, Y: 0, G: 0, ALL: 1 }
    },
    blue: {
        kakashi: { R: 0, B: 1, Y: 0, G: 0, ALL: 0 },
        ring: { R: 0, B: 1, Y: 0, G: 0, ALL: 1 },
        charm: { R: 0, B: 2, Y: 0, G: 0, ALL: 1 },
        bracelet: { R: 0, B: 2, Y: 0, G: 1, ALL: 1 },
        necklace: { R: 0, B: 4, Y: 0, G: 0, ALL: 1 }
    },
    yellow: {

        ring: { R: 0, B: 0, Y: 0, G: 0, ALL: 2 },
        charm: { R: 0, B: 0, Y: 1, G: 0, ALL: 2 },
        bracelet: { R: 0, B: 0, Y: 2, G: 0, ALL: 2 },
        necklace: { R: 0, B: 0, Y: 3, G: 0, ALL: 2 }
    },
    green: {
        kakashi: { R: 0, B: 0, Y: 0, G: 1, ALL: 0 },
        ring: { R: 0, B: 0, Y: 0, G: 1, ALL: 1 },
        charm: { R: 0, B: 0, Y: 0, G: 2, ALL: 1 },
        bracelet: { R: 1, B: 0, Y: 0, G: 2, ALL: 1 },
        necklace: { R: 0, B: 0, Y: 0, G: 4, ALL: 1 }
    },
    gold: {
        kakashi: { R: 0, B: 0, Y: 1, G: 0, ALL: 0 },
        ring: { R: 0, B: 0, Y: 1, G: 0, ALL: 1 },
        charm: { R: 0, B: 0, Y: 1, G: 0, ALL: 2 },

};

// 状態管理
let slotSelections = {
    1: { color: 'red', type: 'kakashi' },
    2: { color: 'blue', type: 'kakashi' },
    3: { color: 'yellow', type: 'kakashi' }
};

let stockMatrix = {};
COLOR_KEYS.forEach(c => { stockMatrix[c] = {}; TYPE_KEYS.forEach(t => stockMatrix[c][t] = 0); });

const TRAIN_LABELS = ['持久力', '筋力', '瞬発力', '命中力', '知力', '精神力'];
let trainingData = [[], [], [], [], [], []];
let currentTrainFocus = 0;
let retainedOresState = { 1: [], 2: [], 3: [] };
let advancedSolutions = [];

function toggleDisplayMode() {
    const body = document.body;
    if (body.classList.contains('dark-mode')) {
        body.classList.remove('dark-mode');
        body.classList.add('light-mode');
    } else {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
    }
}

// 表の開閉制御
function toggleWrapper(id) {
    const el = document.getElementById(id);
    if(el.style.display === 'block') {
        el.style.display = 'none';
    } else {
        el.style.display = 'block';
    }
}

function initSystem() {
    renderSlotMatrices();
    renderStockMatrix();
    syncRetainedOres();
}

// 5x5 スロット選択マトリクスの描画（縦行に配色クラスを付与）
function renderSlotMatrices() {
    for (let s = 1; s <= 3; s++) {
        let html = `<table class="matrix-table"><thead><tr><th></th>`;
        TYPE_KEYS.forEach(t => html += `<th>${TYPE_JA[t]}</th>`);
        html += `</tr></thead><tbody>`;
        
        COLOR_KEYS.forEach(c => {
            html += `<tr><td class="hdr-row-${c}">${COLOR_JA[c]}</td>`;
            TYPE_KEYS.forEach(t => {
                const isActive = (slotSelections[s].color === c && slotSelections[s].type === t) ? 'active ' + (c === 'gold' ? 'gold' : c[0]) : '';
                html += `<td><button class="matrix-cell-btn ${isActive}" onclick="selectSlotItem(${s}, '${c}', '${t}')">選択</button></td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById(`slot-matrix-${s}`).innerHTML = html;
    }
}

function selectSlotItem(slot, color, type) {
    slotSelections[slot].color = color;
    slotSelections[slot].type = type;
    renderSlotMatrices();
    syncRetainedOres();
}

// 5x5 手持ストックマトリクスの描画（縦行に配色クラスを付与）
function renderStockMatrix() {
    let html = `<table class="matrix-table"><thead><tr><th></th>`;
    TYPE_KEYS.forEach(t => html += `<th>${TYPE_JA[t]}</th>`);
    html += `</tr></thead><tbody>`;
    
    COLOR_KEYS.forEach(c => {
        html += `<tr><td class="hdr-row-${c}">${COLOR_JA[c]}</td>`;
        TYPE_KEYS.forEach(t => {
            html += `<td><input type="number" min="0" value="${stockMatrix[c][t]}" class="stock-input" onchange="updateStockValue('${c}', '${t}', this.value)"></td>`;
        });
        html += `</tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('stock-matrix-container').innerHTML = html;
    calculateTotalStock();
}

function updateStockValue(color, type, val) {
    let num = parseInt(val) || 0;
    if (num < 0) num = 0;
    stockMatrix[color][type] = num;
    calculateTotalStock();
}

function calculateTotalStock() {
    let total = 0;
    COLOR_KEYS.forEach(c => TYPE_KEYS.forEach(t => total += stockMatrix[c][t]));
    document.getElementById('lbl-total-stock').innerText = total;
    
    const limit = RANK_LIMITS[document.getElementById('sys-level').value] || 3;
    document.getElementById('lbl-max-stock').innerText = limit;
    if (total > limit) {
        document.getElementById('lbl-total-stock').style.color = '#e53e3e';
    } else {
        document.getElementById('lbl-total-stock').style.color = '';
    }
}

function resetStockMatrix() {
    COLOR_KEYS.forEach(c => TYPE_KEYS.forEach(t => stockMatrix[c][t] = 0));
    renderStockMatrix();
}

function processLevelTransition() {
    calculateTotalStock();
}

// 引き継ぎ鉱石領域の同期描画（要望に準じた黒縁装飾仕様）
function syncRetainedOres() {
    const advSyncArea = document.getElementById('adv-retained-sync-area');
    if(advSyncArea) advSyncArea.innerHTML = "";

    for (let s = 1; s <= 3; s++) {
        const color = slotSelections[s].color;
        const type = slotSelections[s].type;
        const recipe = RECIPES[color][type];
        
        let expectedOres = [];
        ['R', 'B', 'Y', 'G'].forEach(k => {
            for(let i=0; i<recipe[k]; i++) expectedOres.push(k);
        });
        for(let i=0; i<recipe.ALL; i++) expectedOres.push('ALL');

        if (!retainedOresState[s] || retainedOresState[s].length !== expectedOres.length) {
            retainedOresState[s] = new Array(expectedOres.length).fill(false);
        }

        let oreButtonsHtml = "";
        expectedOres.forEach((ore, idx) => {
            let activeClass = "";
            if (retainedOresState[s][idx]) {
                activeClass = ` active-${ore}`;
            }
            
            if (ore === 'ALL') {
                oreButtonsHtml += `<div class="ore-square ore-all-style${activeClass}" onclick="toggleRetainedOreState(${s}, ${idx})"><span class="all-text">ALL</span></div>`;
            } else {
                oreButtonsHtml += `<div class="ore-square ore-${ore}${activeClass}" onclick="toggleRetainedOreState(${s}, ${idx})">${ore}</div>`;
            }
        });

        document.getElementById(`slot-retained-${s}`).innerHTML = oreButtonsHtml || `<span style="font-size:10px;color:#718096;">不要</span>`;
        
        if (advSyncArea) {
            let syncRow = `<div style="font-size:11px;">
                <strong>スロット${s} [${COLOR_JA[color]}${TYPE_JA[type]}]:</strong>
                <div class="ore-grid">${oreButtonsHtml || 'なし'}</div>
            </div>`;
            advSyncArea.innerHTML += syncRow;
        }
    }
}

function toggleRetainedOreState(slot, idx) {
    retainedOresState[slot][idx] = !retainedOresState[slot][idx];
    syncRetainedOres();
}

function toggleAdvancedPanel() {
    const panel = document.getElementById('advanced-panel');
    if (panel.style.display === 'flex') {
        panel.style.display = 'none';
    } else {
        panel.style.display = 'flex';
        syncRetainedOres();
    }
}

// 訓練入力関係
function setTrainingFocus(idx) {
    currentTrainFocus = idx;
    for(let i=0; i<6; i++) document.getElementById(`tb-${i}`).classList.remove('focused');
    document.getElementById(`tb-${idx}`).classList.add('focused');
}

function handlePadInput(cmd) {
    if (['R', 'B', 'Y', 'G', 'N'].includes(cmd)) {
        trainingData[currentTrainFocus].push(cmd);
        refreshTrainingDisplay(currentTrainFocus);
    } else if (cmd === 'DEL') {
        trainingData[currentTrainFocus].pop();
        refreshTrainingDisplay(currentTrainFocus);
    } else if (cmd === 'ENTER') {
        if (currentTrainFocus < 5) {
            setTrainingFocus(currentTrainFocus + 1);
        }
    }
}

// 訓練入力文字の正方形チップ化出力処理（5つで自動改行）
function refreshTrainingDisplay(idx) {
    const container = document.getElementById(`td-${idx}`);
    container.innerHTML = '';
    trainingData[idx].forEach(ore => {
        const chip = document.createElement('span');
        chip.className = `train-chip chip-${ore}`;
        chip.innerText = ore;
        container.appendChild(chip);
    });
}

// スコア算定コア
function computePatternScore(s1, s2, s3, level) {
    const factor = { '見習い': 1, '三級': 2, '二級': 3, '一級': 4 }[level] || 0;
    const isK1 = s1.isCompleted && s1.type === 'kakashi' && s1.color !== 'gold';
    const isK2 = s2.isCompleted && s2.type === 'kakashi' && s2.color !== 'gold';
    const isK3 = s3.isCompleted && s3.type === 'kakashi' && s3.color !== 'gold';

    const fetchBase = (t, c) => c === 'gold' ? 10 : ({ 'ring': 1, 'charm': 2, 'bracelet': 3, 'necklace': 5 }[t] || 0);
    let b1 = s1.isCompleted ? fetchBase(s1.type, s1.color) : 0;
    let b2 = s2.isCompleted ? fetchBase(s2.type, s2.color) : 0;
    let b3 = s3.isCompleted ? fetchBase(s3.type, s3.color) : 0;

    let s1_calc = isK1 ? b1 : b1 * 2;
    let f1 = 0, f2 = 0, f3 = 0;

    if (!isK1 && !isK2 && !isK3) { f1 = s1_calc; f2 = b2; f3 = b3; }
    else if (isK1 && !isK2 && !isK3) { f2 = b2; f1 = f2 * 2; f3 = b3; }
    else if (!isK1 && isK2 && !isK3) { f1 = s1_calc; f3 = b3; f2 = f1 + f3; }
    else if (!isK1 && !isK2 && isK3) { f1 = s1_calc; f2 = b2; f3 = f2; }
    else if (isK1 && isK2 && !isK3) { f3 = b3; f2 = f3; f1 = f2 * 2; }
    else if (isK1 && !isK2 && isK3) { f2 = b2; f1 = f2 * 2; f3 = f2; }
    else if (!isK1 && isK2 && isK3) { f1 = s1_calc; f2 = f1; f3 = f2; }

    let activeItems = [];
    if (s1.isCompleted) activeItems.push(s1);
    if (s2.isCompleted) activeItems.push(s2);
    if (s3.isCompleted) activeItems.push(s3);

    let cBonus = 0, tBonus = 0;
    if (activeItems.length >= 2) {
        if (activeItems.length === 3) {
            if (activeItems[0].color === activeItems[1].color && activeItems[1].color === activeItems[2].color && activeItems[0].type === activeItems[1].type && activeItems[1].type === activeItems[2].type) { cBonus = factor; tBonus = factor; }
            else if ((activeItems[0].color === activeItems[1].color && activeItems[0].type === activeItems[1].type) || (activeItems[1].color === activeItems[2].color && activeItems[1].type === activeItems[2].type) || (activeItems[0].color === activeItems[2].color && activeItems[0].type === activeItems[2].type)) { cBonus = factor; tBonus = factor; }
            else {
                if (activeItems[0].color === activeItems[1].color || activeItems[1].color === activeItems[2].color || activeItems[0].color === activeItems[2].color) cBonus = factor;
                if (activeItems[0].type === activeItems[1].type || activeItems[1].type === activeItems[2].type || activeItems[0].type === activeItems[2].type) tBonus = factor;
            }
        } else {
            if (activeItems[0].color === activeItems[1].color && activeItems[0].type === activeItems[1].type) { cBonus = factor; tBonus = factor; }
            else {
                if (activeItems[0].color === activeItems[1].color) cBonus = factor;
                if (activeItems[0].type === activeItems[1].type) tBonus = factor;
            }
        }
    }
    return { total: (f1 + f2 + f3) + cBonus + tBonus, f1, f2, f3 };
}

// 標準解析
function executeStandardAnalysis() {
    const curScore = parseInt(document.getElementById('sys-cur-score').value) || 0;
    const tarScore = parseInt(document.getElementById('sys-tar-score').value) || 0;
    const allowOver = document.getElementById('sys-over-score').checked;
    const gap = tarScore - curScore;
    const lv = document.getElementById('sys-level').value;

    let flatStock = [];
    COLOR_KEYS.forEach(c => TYPE_KEYS.forEach(t => {
        for(let i=0; i<stockMatrix[c][t]; i++) flatStock.push({color:c, type:t});
    }));

    let options1 = [{ color: slotSelections[1].color, type: slotSelections[1].type, sIdx: null }];
    let options2 = [{ color: slotSelections[2].color, type: slotSelections[2].type, sIdx: null }];
    let options3 = [{ color: slotSelections[3].color, type: slotSelections[3].type, sIdx: null }];

    flatStock.forEach((st, idx) => {
        if (st.color === slotSelections[1].color || st.type === slotSelections[1].type) options1.push({ color: st.color, type: st.type, sIdx: idx });
        if (st.color === slotSelections[2].color || st.type === slotSelections[2].type) options2.push({ color: st.color, type: st.type, sIdx: idx });
        if (st.color === slotSelections[3].color || st.type === slotSelections[3].type) options3.push({ color: st.color, type: st.type, sIdx: idx });
    });

    let matches = [];
    for (let o1 of options1) {
        for (let o2 of options2) {
            for (let o3 of options3) {
                let u = new Set();
                if (o1.sIdx !== null) u.add(o1.sIdx);
                if (o2.sIdx !== null) { if(u.has(o2.sIdx)) continue; u.add(o2.sIdx); }
                if (o3.sIdx !== null) { if(u.has(o3.sIdx)) continue; u.add(o3.sIdx); }

                let res = computePatternScore({color: o1.color, type: o1.type, isCompleted: true}, {color: o2.color, type: o2.type, isCompleted: true}, {color: o3.color, type: o3.type, isCompleted: true}, lv);
                let valid = allowOver ? (res.total >= Math.max(0, gap)) : (res.total === gap);
                if (valid) matches.push({ o1, o2, o3, res });
            }
        }
    }

    const out = document.getElementById('standard-results');
    if (matches.length === 0) {
        out.innerHTML = `<span style="color:#e53e3e;">条件に合致する交換手順は存在しません。</span>`;
        return;
    }

    matches.sort((a,b) => b.res.total - a.res.total);
    let html = `<div style="margin-bottom:8px; font-weight:bold;">解析結果: 必要スコア差分 ${gap} pts</div>`;
    matches.forEach((m, i) => {
        html += `<div class="result-row-item">` +
                `<strong>パターン ${i+1}: 獲得 +${m.res.total} pts (合計: ${curScore + m.res.total} pts)</strong><br>` +
                `・スロット1: [${COLOR_JA[m.o1.color]}${TYPE_JA[m.o1.type]}] (➔ ${m.res.f1}pts)<br>` +
                `・スロット2: [${COLOR_JA[m.o2.color]}${TYPE_JA[m.o2.type]}] (➔ ${m.res.f2}pts)<br>` +
                `・スロット3: [${COLOR_JA[m.o3.color]}${TYPE_JA[m.o3.type]}] (➔ ${m.res.f3}pts)</div>`;
    });
    out.innerHTML = html;
}

// 精密シミュレーション
function executeAdvancedAnalysis() {
    const curScore = parseInt(document.getElementById('sys-cur-score').value) || 0;
    const tarScore = parseInt(document.getElementById('sys-tar-score').value) || 0;
    const allowOver = document.getElementById('sys-over-score').checked;
    const gap = tarScore - curScore;
    const lv = document.getElementById('sys-level').value;

    let flatStock = [];
    COLOR_KEYS.forEach(c => TYPE_KEYS.forEach(t => {
        for(let i=0; i<stockMatrix[c][t]; i++) flatStock.push({color:c, type:t});
    }));

    advancedSolutions = [];

    let swapSets = [[null], [null], [null]];
    flatStock.forEach((st, idx) => {
        if(st.color === slotSelections[1].color || st.type === slotSelections[1].type) swapSets[0].push(idx);
        if(st.color === slotSelections[2].color || st.type === slotSelections[2].type) swapSets[1].push(idx);
        if(st.color === slotSelections[3].color || st.type === slotSelections[3].type) swapSets[2].push(idx);
    });

    for (let c0 of swapSets[0]) {
        for (let c1 of swapSets[1]) {
            for (let c2 of swapSets[2]) {
                let u = new Set();
                if(c0 !== null) u.add(c0);
                if(c1 !== null) { if(u.has(c1)) continue; u.add(c1); }
                if(c2 !== null) { if(u.has(c2)) continue; u.add(c2); }

                let activeSlots = [
                    c0 === null ? slotSelections[1] : flatStock[c0],
                    c1 === null ? slotSelections[2] : flatStock[c1],
                    c2 === null ? slotSelections[3] : flatStock[c2]
                ];

                let remStocks = [];
                flatStock.forEach((st, idx) => { if(!u.has(idx)) remStocks.push(st); });

                let convCombos = [[]];
                const len = remStocks.length;
                for(let i=1; i < (1 << len); i++) {
                    let combo = [];
                    for(let j=0; j<len; j++) { if((i >> j) & 1) combo.push(remStocks[j]); }
                    convCombos.push(combo);
                }

                for (let convList of convCombos) {
                    let cBonus = { R:0, B:0, Y:0, G:0 };
                    convList.forEach(item => {
                        if (item.color === 'gold') { cBonus.R++; cBonus.B++; cBonus.Y++; cBonus.G++; }
                        else if (item.color === 'red') cBonus.R++;
                        else if (item.color === 'blue') cBonus.B++;
                        else if (item.color === 'yellow') cBonus.Y++;
                        else if (item.color === 'green') cBonus.G++;
                    });

                    for (let t = 0; t < 6; t++) {
                        let tOres = trainingData[t];
                        let tCounts = { R:0, B:0, Y:0, G:0, N:0 };
                        tOres.forEach(o => tCounts[o]++);

                        let compFlags = [false, false, false];

                        for (let s = 0; s < 3; s++) {
                            const item = activeSlots[s];
                            const rec = RECIPES[item.color][item.type];
                            
                            let pool = { 
                                R: cBonus.R + tCounts.R, 
                                B: cBonus.B + tCounts.B, 
                                Y: cBonus.Y + tCounts.Y, 
                                G: cBonus.G + tCounts.G, 
                                N: tCounts.N 
                            };
                            
                            if ((s === 0 && c0 === null) || (s === 1 && c1 === null) || (s === 2 && c2 === null)) {
                                const states = retainedOresState[s+1] || [];
                                const origRec = RECIPES[slotSelections[s+1].color][slotSelections[s+1].type];
                                let origList = [];
                                ['R', 'B', 'Y', 'G'].forEach(k => { for(let i=0; i<origRec[k]; i++) origList.push(k); });
                                for(let i=0; i<origRec.ALL; i++) origList.push('ALL');
                                
                                states.forEach((act, oIdx) => {
                                    if(act && oIdx < origList.length) {
                                        let type = origList[oIdx];
                                        if (type === 'ALL') pool.N++; else pool[type]++;
                                    }
                                });
                            }

                            let dR = pool.R - rec.R;
                            let dB = pool.B - rec.B;
                            let dY = pool.Y - rec.Y;
                            let dG = pool.G - rec.G;

                            if (dR >= 0 && dB >= 0 && dY >= 0 && dG >= 0) {
                                if ((dR + dB + dY + dG + pool.N) >= rec.ALL) {
                                    compFlags[s] = true;
                                }
                            }
                        }

                        let scoreRes = computePatternScore(
                            { color: activeSlots[0].color, type: activeSlots[0].type, isCompleted: compFlags[0] },
                            { color: activeSlots[1].color, type: activeSlots[1].type, isCompleted: compFlags[1] },
                            { color: activeSlots[2].color, type: activeSlots[2].type, isCompleted: compFlags[2] },
                            lv
                        );

                        let valid = allowOver ? (scoreRes.total >= Math.max(0, gap)) : (scoreRes.total === gap);
                        if (valid && scoreRes.total > 0) {
                            advancedSolutions.push({
                                swaps: [c0, c1, c2],
                                activeSlots,
                                converts: convList,
                                trainIdx: t,
                                trainName: TRAIN_LABELS[t],
                                scoreRes,
                                compFlags
                            });
                        }
                    }
                }
            }
        }
    }

    const out = document.getElementById('advanced-results');
    if (advancedSolutions.length === 0) {
        out.innerHTML = `<span style="color:#e53e3e;">設定された訓練分布および鉱石条件から目標を満たすルートは検出されませんでした。</span>`;
        return;
    }

    advancedSolutions.sort((a,b) => b.scoreRes.total - a.scoreRes.total);
    let html = `<div style="font-weight:bold; margin-bottom:6px;">検出ルート件数: ${advancedSolutions.length} 件 (選択して詳細フロー表示)</div>`;
    advancedSolutions.slice(0, 20).forEach((sol, i) => {
        html += `<div class="result-row-item" onclick="renderFlowchart(${i})">` +
                `<strong>ルート ${i+1}: 獲得 +${sol.scoreRes.total} pts (訓練: ${sol.trainName})</strong><br>` +
                `<span style="font-size:11px; opacity:0.8;">達成判定: スロット1(${sol.compFlags[0]?'○':'×'}) | スロット2(${sol.compFlags[1]?'○':'×'}) | スロット3(${sol.compFlags[2]?'○':'×'})</span></div>`;
    });
    out.innerHTML = html;
}

function renderFlowchart(idx) {
    const sol = advancedSolutions[idx];
    const target = document.getElementById('flowchart-output');
    
    let html = `<div class="flow-container">` +
               `<h4 style="margin:0 0 6px 0; font-size:12px;">【解析ルート ${idx+1} 実行手順】</h4>`;
    
    let swapNotes = [];
    for(let s=0; s<3; s++) {
        if(sol.swaps[s] !== null) {
            swapNotes.push(`スロット${s+1}をストック内の [${COLOR_JA[sol.activeSlots[s].color]}${TYPE_JA[sol.activeSlots[s].type]}] と入れ替える（※該当スロットの既存引き継ぎ鉱石は消失）`);
        }
    }
    
    if(swapNotes.length > 0) {
        swapNotes.forEach(n => html += `<div>・${n}</div>`);
    } else {
        html += `<div>・スロットの入れ替え操作は不要（引き継ぎ鉱石状態を維持）</div>`;
    }

    if(sol.converts.length > 0) {
        let items = sol.converts.map(c => `[${COLOR_JA[c.color]}${TYPE_JA[c.type]}]`).join(', ');
        html += `<div>・手持ストック内のレシピ ${items} を鉱石へ変換する（全スロットに割り当て）</div>`;
    } else {
        html += `<div>・ストックレシピの変換操作は不要</div>`;
    }

    html += `<div>・訓練<strong>「${sol.trainName}」</strong>を選択し、対象領域の鉱石を回収する</div>`;

    let comps = [];
    if(sol.compFlags[0]) comps.push("スロット1");
    if(sol.compFlags[1]) comps.push("スロット2");
    if(sol.compFlags[2]) comps.push("スロット3");
    
    html += `<div style="margin-top:6px; font-weight:bold; color:var(--color-green);">➔ ターン終了時確定: ${comps.join(', ')} が完成。計 +${sol.scoreRes.total} pts が加算されます。</div></div>`;
    
    target.innerHTML = html;
    target.scrollIntoView({ behavior: 'smooth' });
}

// 初期化処理起動
initSystem();
</script>

</body>
</html>
