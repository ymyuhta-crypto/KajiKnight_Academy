<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カジナイトアカデミー鍛冶指図書</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e0e0e0;
            --border-color: #2d2d35;
            --accent-color: #4a5568;
            --accent-hover: #718096;
            
            /* 鮮やかな対応色 */
            --color-red: #ff3b30;
            --color-blue: #007aff;
            --color-yellow: #ff9500;
            --color-green: #34c759;
            --color-gold: #ffcc00;
            
            --slot1-bg: #6b21a8; 
            --slot-normal-bg: #1e293b;
            --ore-box-bg: #2a2a2e;
        }

        body.light-mode {
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            --accent-color: #4a5568;
            --accent-hover: #2d3748;
            --slot-normal-bg: #edf2f7;
            --ore-box-bg: #e2e8f0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .container {
            width: 100%;
            max-width: 1350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .mode-toggle {
            padding: 6px 12px;
            font-size: 12px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 2x2 グリッドレイアウト */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .grid-block-flex {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            box-sizing: border-box;
        }

        .section-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            color: var(--text-color);
        }

        /* 動的アイテムカラー適用スタイル */
        .btn-active-red { background-color: #ff3b30 !important; color: #ffffff !important; }
        .btn-active-blue { background-color: #007aff !important; color: #ffffff !important; }
        .btn-active-yellow { background-color: #ff9500 !important; color: #ffffff !important; }
        .btn-active-green { background-color: #34c759 !important; color: #ffffff !important; }
        .btn-active-gold { 
            background: linear-gradient(135deg, #ffe066 0%, #f5b041 50%, #d4ac0d 100%) !important; 
            color: #000000 !important; 
        }

        /* テキスト表示用 */
        .text-red { color: #ff3b30 !important; }
        .text-blue { color: #007aff !important; }
        .text-yellow { color: #ff9500 !important; }
        .text-green { color: #34c759 !important; }
        .text-gold { color: #b7950b !important; font-weight: bold; }
        .dark-mode .text-gold { color: #ffd700 !important; font-weight: bold; }

        .trigger-btn {
            display: block;
            width: 100%;
            padding: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        .trigger-btn:hover { opacity: 0.8; }

        .matrix-wrapper {
            display: none;
            margin-top: 5px;
            margin-bottom: 15px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
        }

        /* 5x5 マトリクス：全列等幅化 */
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            table-layout: fixed;
        }
        .matrix-table th, .matrix-table td {
            border: 1px solid var(--border-color);
            padding: 6px 2px;
            text-align: center;
            width: 16.66%;
            box-sizing: border-box;
        }
        .matrix-table th {
            background-color: rgba(0,0,0,0.1);
            font-weight: bold;
        }
        
        .matrix-row-red { background-color: rgba(255, 59, 48, 0.08); }
        .matrix-row-blue { background-color: rgba(0, 122, 255, 0.08); }
        .matrix-row-yellow { background-color: rgba(255, 149, 0, 0.08); }
        .matrix-row-green { background-color: rgba(52, 199, 89, 0.08); }
        .matrix-row-gold { background-color: rgba(255, 204, 0, 0.08); }

        .matrix-cell-btn {
            width: 100%;
            padding: 6px 0;
            background: transparent;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            border-radius: 3px;
        }
        
        .matrix-cell-btn.active.r { background-color: #ff3b30 !important; color: #ffffff !important; }
        .matrix-cell-btn.active.b { background-color: #007aff !important; color: #ffffff !important; }
        .matrix-cell-btn.active.y { background-color: #ff9500 !important; color: #ffffff !important; }
        .matrix-cell-btn.active.g { background-color: #34c759 !important; color: #ffffff !important; }
        .matrix-cell-btn.active.gold { 
            background: linear-gradient(135deg, #ffe066 0%, #f5b041 50%, #d4ac0d 100%) !important; 
            color: #000000 !important; 
        }

        /* ライトモードバグ対策 */
        body.light-mode .slot-1 .matrix-wrapper { background-color: #ffffff; color: #2d3748; }
        body.light-mode .slot-1 .matrix-table th { color: #2d3748; background-color: #f7fafc; }
        body.light-mode .slot-1 .matrix-table td button:not(.active) { color: #2d3748; }

        /* スロット構造 */
        .slot-container {
            background-color: var(--slot-normal-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
        }
        .slot-container.slot-1 {
            background-color: var(--slot1-bg);
            color: #ffffff !important;
        }
        body.light-mode .slot-container.slot-1 { color: #ffffff !important; }
        body.light-mode .slot-container.slot-1 .section-title { color: #ffffff !important; }
        body.light-mode .slot-container.slot-1 .section-title-container { border-color: rgba(255, 255, 255, 0.3) !important; }
        body.light-mode .slot-container.slot-1 .trigger-btn:not([class*="btn-active"]) { background-color: rgba(255,255,255,0.1); color: #ffffff; border-color: rgba(255,255,255,0.3); }

        .slot-layout { display: flex; gap: 12px; align-items: flex-start; }
        .slot-main { flex: 2; }
        .slot-side {
            flex: 1;
            background: rgba(0,0,0,0.15);
            padding: 8px;
            border-radius: 4px;
            min-height: 75px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 鉱石デザイン */
        .ore-grid { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
        .ore-square {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            border: 2px solid #000000;
            background: var(--ore-box-bg);
            font-family: sans-serif;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
            color: #ffffff;
        }
        
        .ore-square.ore-R { color: var(--color-red); }
        .ore-square.ore-B { color: var(--color-blue); }
        .ore-square.ore-Y { color: var(--color-yellow); }
        .ore-square.ore-G { color: var(--color-green); }

        .ore-square.active-R { background-color: #ff3b30 !important; color: #ffffff !important; }
        .ore-square.active-B { background-color: #007aff !important; color: #ffffff !important; }
        .ore-square.active-Y { background-color: #ff9500 !important; color: #ffffff !important; }
        .ore-square.active-G { background-color: #34c759 !important; color: #ffffff !important; }
        body.light-mode .ore-square[class*="active-"] { color: #000000 !important; }
        
        .ore-square.ore-all-style { border: 2px solid #000000; background: var(--ore-box-bg); }
        .ore-square.ore-all-style.active-ALL { background: linear-gradient(to bottom, #00ffff, #ffffff, #ff00ff) !important; color: #000000 !important;}
        .ore-square.ore-all-style .all-text { font-family: sans-serif; font-weight: bold; font-size: 10px; }

        /* 手持ストックアイテム用デザイン */
        .stock-header-control {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(0,0,0,0.05);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 12px;
        }
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .stock-block {
            background: rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            min-height: 55px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        body.light-mode .stock-block:not([class*="btn-active"]) { background: #edf2f7; }
        .stock-block.focused { border: 2px solid var(--text-color); }
        .stock-block.disabled { opacity: 0.35; pointer-events: none; background: rgba(0,0,0,0.08) !important; }
        .stock-lbl { font-size: 11px; font-weight: bold; opacity: 0.7; margin-bottom: 2px; }
        .stock-val-text { font-size: 12px; font-weight: bold; }

        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 12px; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.03);
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .input-item { display: flex; justify-content: space-between; align-items: center; }
        .sys-input { width: 80px; padding: 4px; border-radius: 4px; border: 1px solid var(--border-color); background: transparent; color: var(--text-color); text-align: center; }
        .sys-select { padding: 4px; border-radius: 4px; border: 1px solid var(--border-color); background: transparent; color: var(--text-color); font-size: 12px; }

        .action-btn { width: 100%; padding: 10px; background-color: var(--accent-color); color: #ffffff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .action-btn:hover { background-color: var(--accent-hover); }

        .sort-toggle-btn { padding: 4px 10px; background-color: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-color); cursor: pointer; font-size: 11px; font-weight: bold; }
        body.light-mode .sort-toggle-btn { background-color: #edf2f7; }

        .results-area { max-height: 280px; overflow-y: auto; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 4px; font-size: 12px; border: 1px solid var(--border-color); }
        .result-row-item { padding: 8px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .result-row-item:hover { background: rgba(0,0,0,0.05); }

        /* 訓練セクション：2行3列配置 */
        .training-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .train-block { background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; cursor: pointer; min-height: 65px; box-sizing: border-box; }
        body.light-mode .train-block { background: #edf2f7; }
        .train-block.focused { border: 2px solid var(--text-color); background: rgba(0,0,0,0.08); }
        .train-lbl { font-size: 11px; font-weight: bold; margin-bottom: 4px;}
        .train-val { display: flex; flex-wrap: wrap; gap: 3px; width: 100%; }

        /* 訓練内チップ */
        .train-chip { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-family: sans-serif; font-weight: 900; font-size: 11px; border: 1px solid #000000; border-radius: 3px; box-sizing: border-box; }
        .train-chip.chip-R { background-color: rgba(255, 59, 48, 0.25); color: var(--color-red); }
        .train-chip.chip-B { background-color: rgba(0, 122, 255, 0.25); color: var(--color-blue); }
        .train-chip.chip-Y { background-color: rgba(255, 149, 0, 0.25); color: var(--color-yellow); }
        .train-chip.chip-G { background-color: rgba(52, 199, 89, 0.25); color: var(--color-green); }
        .train-chip.chip-N { background-color: rgba(113, 128, 150, 0.25); color: #e0e0e0; }
        body.light-mode .train-chip { color: #000000 !important; }

        /* パッドボタン */
        .pad-box { display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 4px; }
        .pad-line { display: flex; gap: 6px; }
        .p-btn { flex: 1; padding: 10px 0; font-weight: bold; border-radius: 4px; border: 1px solid var(--border-color); cursor: pointer; }
        .p-btn.c-r { background-color: rgba(255, 59, 48, 0.2); color: var(--color-red); }
        .p-btn.c-b { background-color: rgba(0, 122, 255, 0.2); color: var(--color-blue); }
        .p-btn.c-y { background-color: rgba(255, 149, 0, 0.2); color: var(--color-yellow); }
        .p-btn.c-g { background-color: rgba(52, 199, 89, 0.2); color: var(--color-green); }
        .p-btn.c-n { background-color: rgba(113, 128, 150, 0.2); color: var(--text-color); }
        .p-btn.sys-op { background-color: var(--card-bg); color: var(--text-color); font-size: 11px; }
        body.light-mode .p-btn:not(.sys-op) { color: #000000; font-weight: 900; }

        .flow-container { background: rgba(0,0,0,0.15); border-left: 3px solid var(--accent-color); padding: 10px; border-radius: 0 4px 4px 0; font-size: 11px; line-height: 1.6; margin-top: 10px;}
        
        /* 最終結果用黒太文字スタイル */
        .flow-final-result {
            margin-top: 8px; 
            font-weight: bold !important; 
            color: #000000 !important; 
            background-color: #ffffff; 
            padding: 4px 8px; 
            border-radius: 3px; 
            display: inline-block;
            border: 1px solid #000000;
        }

        /* SNS・コミュニティリンクエリア */
        .sns-share-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        .sns-link {
            font-size: 12px;
            font-weight: bold;
            color: #007aff;
            text-decoration: none;
        }
        .dark-mode .sns-link { color: #63b3ed; }
        .sns-link:hover { text-decoration: underline; }

        .info-text { font-size: 11px; color: #718096; text-align: center; margin-top: 5px; }
    </style>
</head>
<body class="dark-mode">

<div class="container">
    <div class="header-area">
        <h1>カジナイトアカデミー鍛冶指図書</h1>
        <button class="mode-toggle" onclick="toggleDisplayMode()">表示モード切替</button>
    </div>

    <div class="main-grid">
        
        <div class="grid-block-flex">
            <div class="slot-container slot-1">
                <div class="slot-layout">
                    <div class="slot-main">
                        <div class="section-title-container"><div class="section-title">スロット 1</div></div>
                        <button id="slot-trigger-btn-1" class="trigger-btn" onclick="toggleWrapper('slot-matrix-wrapper-1')">[ アイテムを入力 ]</button>
                        <div id="slot-matrix-wrapper-1" class="matrix-wrapper">
                            <div id="slot-matrix-1"></div>
                        </div>
                    </div>
                    <div class="slot-side">
                        <div style="font-size:11px; font-weight:bold;">引き継ぎ鉱石</div>
                        <div id="slot-retained-1" class="ore-grid"></div>
                    </div>
                </div>
            </div>

            <div class="slot-container">
                <div class="slot-layout">
                    <div class="slot-main">
                        <div class="section-title-container"><div class="section-title">スロット 2</div></div>
                        <button id="slot-trigger-btn-2" class="trigger-btn" onclick="toggleWrapper('slot-matrix-wrapper-2')">[ アイテムを入力 ]</button>
                        <div id="slot-matrix-wrapper-2" class="matrix-wrapper">
                            <div id="slot-matrix-2"></div>
                        </div>
                    </div>
                    <div class="slot-side">
                        <div style="font-size:11px; font-weight:bold;">引き継ぎ鉱石</div>
                        <div id="slot-retained-2" class="ore-grid"></div>
                    </div>
                </div>
            </div>

            <div class="slot-container">
                <div class="slot-layout">
                    <div class="slot-main">
                        <div class="section-title-container"><div class="section-title">スロット 3</div></div>
                        <button id="slot-trigger-btn-3" class="trigger-btn" onclick="toggleWrapper('slot-matrix-wrapper-3')">[ アイテムを入力 ]</button>
                        <div id="slot-matrix-wrapper-3" class="matrix-wrapper">
                            <div id="slot-matrix-3"></div>
                        </div>
                    </div>
                    <div class="slot-side">
                        <div style="font-size:11px; font-weight:bold;">引き継ぎ鉱石</div>
                        <div id="slot-retained-3" class="ore-grid"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel-box">
            <div class="section-title-container">
                <div class="section-title">手持ストックアイテム設定</div>
                <button onclick="resetAllStockSlots()" style="padding:3px 8px; font-size:11px; cursor:pointer; font-weight:bold;">ストック全リセット</button>
            </div>
            
            <div class="stock-header-control">
                <label>現在の鍛冶師段位:</label>
                <select id="sys-level" onchange="processLevelTransition()" class="sys-select">
                    <option value="見習い">見習い（ストック枠: 3）</option>
                    <option value="三級">三級（ストック枠: 4）</option>
                    <option value="二級">二級（ストック枠: 5）</option>
                    <option value="一級">一級（ストック枠: 6）</option>
                </select>
                <span style="margin-left:auto;">登録数: <strong id="lbl-total-stock">0</strong> / <span id="lbl-max-stock">3</span> 枠</span>
            </div>

            <div id="stock-slots-container" class="stock-grid"></div>
            
            <div id="stock-matrix-wrapper" class="matrix-wrapper">
                <div id="stock-matrix-title" style="font-size:11px; font-weight:bold; margin-bottom:6px; text-align:center;"></div>
                <div id="stock-matrix-container"></div>
            </div>
            
            <div id="adv-retained-sync-area" style="background:rgba(0,0,0,0.03); padding:8px; border-radius:4px; display:flex; flex-direction:column; gap:6px; font-size:11px;"></div>
        </div>

        <div class="panel-box">
            <div class="section-title-container"><div class="section-title">6種訓練における鉱石分布入力</div></div>
            <div class="training-matrix">
                <div id="tb-0" class="train-block focused" onclick="setTrainingFocus(0)"><div class="train-lbl">持久力</div><div id="td-0" class="train-val"></div></div>
                <div id="tb-1" class="train-block" onclick="setTrainingFocus(1)"><div class="train-lbl">筋力</div><div id="td-1" class="train-val"></div></div>
                <div id="tb-2" class="train-block" onclick="setTrainingFocus(2)"><div class="train-lbl">瞬発力</div><div id="td-2" class="train-val"></div></div>
                <div id="tb-3" class="train-block" onclick="setTrainingFocus(3)"><div class="train-lbl">命中力</div><div id="td-3" class="train-val"></div></div>
                <div id="tb-4" class="train-block" onclick="setTrainingFocus(4)"><div class="train-lbl">知力</div><div id="td-4" class="train-val"></div></div>
                <div id="tb-5" class="train-block" onclick="setTrainingFocus(5)"><div class="train-lbl">精神力</div><div id="td-5" class="train-val"></div></div>
            </div>

            <div class="pad-box">
                <div class="pad-line">
                    <button onclick="handlePadInput('R')" class="p-btn c-r">R</button>
                    <button onclick="handlePadInput('B')" class="p-btn c-b">B</button>
                    <button onclick="handlePadInput('Y')" class="p-btn c-y">Y</button>
                    <button onclick="handlePadInput('G')" class="p-btn c-g">G</button>
                    <button onclick="handlePadInput('N')" class="p-btn c-n">N</button>
                </div>
                <div class="pad-line">
                    <button onclick="handlePadInput('DEL')" class="p-btn sys-op">1文字削除</button>
                    <button onclick="handlePadInput('ENTER')" class="p-btn sys-op">Enter (次へ)</button>
                    <button onclick="handlePadInput('RESET')" class="p-btn sys-op">Delete (分布リセット)</button>
                </div>
            </div>
        </div>

        <div class="panel-box">
            <div class="section-title-container"><div class="section-title">分析条件 ＆ シミュレーション結果</div></div>
            
            <div class="input-group" style="margin-bottom:12px;">
                <div class="input-item">
                    <label>現在保有スコア:</label>
                    <input type="number" id="sys-cur-score" value="0" min="0" class="sys-input">
                </div>
                <div class="input-item">
                    <label>目標達成スコア:</label>

<script>
const COLOR_KEYS = ['red', 'blue', 'yellow', 'green', 'gold'];
const TYPE_KEYS = ['kakashi', 'ring', 'charm', 'bracelet', 'necklace'];
const COLOR_JA = { red: '赤色', blue: '青色', yellow: '黄色', green: '緑色', gold: '金色' };
const TYPE_JA = { kakashi: 'カカシ', ring: '指輪', charm: 'チャーム', bracelet: '腕輪', necklace: '首飾り' };
const TYPE_NUMS = { kakashi: '0', ring: '1', charm: '2', bracelet: '3', necklace: '5' };
const RANK_LIMITS = { '見習い': 3, '三級': 4, '二級': 5, '一級': 6 };

const RECIPES = {
    red: { kakashi: { R: 1, B: 0, Y: 0, G: 0, ALL: 0 }, ring: { R: 1, B: 0, Y: 0, G: 0, ALL: 1 }, charm: { R: 2, B: 0, Y: 0, G: 0, ALL: 1 }, bracelet: { R: 2, B: 1, Y: 0, G: 0, ALL: 1 }, necklace: { R: 4, B: 0, Y: 0, G: 0, ALL: 1 } },
    blue: { kakashi: { R: 0, B: 1, Y: 0, G: 0, ALL: 0 }, ring: { R: 0, B: 1, Y: 0, G: 0, ALL: 1 }, charm: { R: 0, B: 2, Y: 0, G: 0, ALL: 1 }, bracelet: { R: 0, B: 2, Y: 0, G: 1, ALL: 1 }, necklace: { R: 0, B: 4, Y: 0, G: 0, ALL: 1 } },
    yellow: { kakashi: { R: 0, B: 0, Y: 0, G: 0, ALL: 1 }, ring: { R: 0, B: 0, Y: 0, G: 0, ALL: 2 }, charm: { R: 0, B: 0, Y: 1, G: 0, ALL: 2 }, bracelet: { R: 0, B: 0, Y: 2, G: 0, ALL: 2 }, necklace: { R: 0, B: 0, Y: 3, G: 0, ALL: 2 } },
    green: { kakashi: { R: 0, B: 0, Y: 0, G: 1, ALL: 0 }, ring: { R: 0, B: 0, Y: 0, G: 1, ALL: 1 }, charm: { R: 0, B: 0, Y: 0, G: 2, ALL: 1 }, bracelet: { R: 1, B: 0, Y: 0, G: 2, ALL: 1 }, necklace: { R: 0, B: 0, Y: 0, G: 4, ALL: 1 } },
    gold: { kakashi: { R: 0, B: 0, Y: 1, G: 0, ALL: 0 }, ring: { R: 0, B: 0, Y: 1, G: 0, ALL: 1 }, charm: { R: 0, B: 0, Y: 1, G: 0, ALL: 2 }, bracelet: { R: 0, B: 0, Y: 1, G: 0, ALL: 3 }, necklace: { R: 0, B: 0, Y: 1, G: 0, ALL: 4 } }
};

let slotSelections = {
    1: { color: 'red', type: 'kakashi' },
    2: { color: 'blue', type: 'kakashi' },
    3: { color: 'yellow', type: 'kakashi' }
};

let stockSlots = [
    { color: null, type: null }, { color: null, type: null }, { color: null, type: null },
    { color: null, type: null }, { color: null, type: null }, { color: null, type: null }
];
let currentStockFocus = 0;

const TRAIN_LABELS = ['持久力', '筋力', '瞬発力', '命中力', '知力', '精神力'];
let trainingData = [[], [], [], [], [], []];
let currentTrainFocus = 0;
let retainedOresState = { 1: [], 2: [], 3: [] };
let advancedSolutions = [];
let sortOrderDesc = false;

function toggleDisplayMode() {
    const body = document.body;
    if (body.classList.contains('dark-mode')) {
        body.classList.remove('dark-mode');
        body.classList.add('light-mode');
    } else {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
    }
    syncRetainedOres();
}

function toggleWrapper(id) {
    const el = document.getElementById(id);
    el.style.display = (el.style.display === 'block') ? 'none' : 'block';
}

function initSystem() {
    renderSlotMatrices();
    renderStockSlotsUI();
    updateAllSlotButtons();
    syncRetainedOres();
}

function updateSlotTriggerButton(slot) {
    const btn = document.getElementById(`slot-trigger-btn-${slot}`);
    const sel = slotSelections[slot];
    if (sel.color && sel.type) {
        btn.innerText = `${COLOR_JA[sel.color]}の${TYPE_JA[sel.type]}`;
        btn.className = `trigger-btn btn-active-${sel.color}`;
    } else {
        btn.innerText = `[ アイテムを入力 ]`;
        btn.className = `trigger-btn`;
    }
}

function updateAllSlotButtons() {
    for (let s = 1; s <= 3; s++) updateSlotTriggerButton(s);
}

function renderSlotMatrices() {
    for (let s = 1; s <= 3; s++) {
        let html = `<table class="matrix-table"><thead><tr><th></th>`;
        TYPE_KEYS.forEach(t => html += `<th>${TYPE_JA[t]}</th>`);
        html += `</tr></thead><tbody>`;
        
        COLOR_KEYS.forEach(c => {
            html += `<tr class="matrix-row-${c}"><td><strong>${COLOR_JA[c][0]}</strong></td>`;
            TYPE_KEYS.forEach(t => {
                const isActive = (slotSelections[s].color === c && slotSelections[s].type === t) ? 'active ' + (c === 'gold' ? 'gold' : c[0]) : '';
                html += `<td><button class="matrix-cell-btn ${isActive}" onclick="selectSlotItem(${s}, '${c}', '${t}')">${TYPE_NUMS[t]}</button></td>`;
            });
            html += `</tr>`;
        });
        html += `</tr></tbody></table>`;
        document.getElementById(`slot-matrix-${s}`).innerHTML = html;
    }
}

function selectSlotItem(slot, color, type) {
    slotSelections[slot].color = color;
    slotSelections[slot].type = type;
    renderSlotMatrices();
    updateSlotTriggerButton(slot);
    syncRetainedOres();
    document.getElementById(`slot-matrix-wrapper-${slot}`).style.display = 'none';
}

function renderStockSlotsUI() {
    const container = document.getElementById('stock-slots-container');
    const limit = RANK_LIMITS[document.getElementById('sys-level').value] || 3;
    let html = "";
    
    for (let i = 0; i < 6; i++) {
        const slot = stockSlots[i];
        const isDisabled = i >= limit;
        const disabledClass = isDisabled ? ' disabled' : '';
        const focusedClass = (!isDisabled && currentStockFocus === i && document.getElementById('stock-matrix-wrapper')?.style.display === 'block') ? ' focused' : '';
        
        let valText = "未設定";
        let colorClass = "";
        if (slot.color && slot.type) {
            valText = `${COLOR_JA[slot.color]}の${TYPE_JA[slot.type]}`;
            colorClass = ` btn-active-${slot.color}`;
        }
        
        html += `<div id="stock-block-${i}" class="stock-block${disabledClass}${focusedClass}${colorClass}" onclick="openStockMatrix(${i})">
            <div class="stock-lbl" style="${slot.color === 'gold' ? 'color:#000;' : ''}">ストック ${i + 1}</div>
            <div class="stock-val-text">${valText}</div>
        </div>`;
    }
    container.innerHTML = html;
    calculateTotalStock();
}

function openStockMatrix(idx) {
    currentStockFocus = idx;
    const wrapper = document.getElementById('stock-matrix-wrapper');
    document.getElementById('stock-matrix-title').innerText = `【ストック ${idx + 1}】アイテム設定（選択済タップで取消）`;
    
    let html = `<table class="matrix-table"><thead><tr><th></th>`;
    TYPE_KEYS.forEach(t => html += `<th>${TYPE_JA[t]}</th>`);
    html += `</tr></thead><tbody>`;
    
    const curSlot = stockSlots[idx];
    COLOR_KEYS.forEach(c => {
        html += `<tr class="matrix-row-${c}"><td><strong>${COLOR_JA[c][0]}</strong></td>`;
        TYPE_KEYS.forEach(t => {
            const isCurrent = (curSlot.color === c && curSlot.type === t);
            const isActive = isCurrent ? 'active ' + (c === 'gold' ? 'gold' : c[0]) : '';
            const displayText = isCurrent ? '取消' : TYPE_NUMS[t];
            html += `<td><button class="matrix-cell-btn ${isActive}" onclick="selectStockItem('${c}', '${t}')">${displayText}</button></td>`;
        });
        html += `</tr>`;
    });
    html += `</tbody></table>`;
    
    document.getElementById('stock-matrix-container').innerHTML = html;
    wrapper.style.display = 'block';
    
    for(let i=0; i<6; i++) {
        const el = document.getElementById(`stock-block-${i}`);
        if(el) { el.classList.remove('focused'); if(i === idx) el.classList.add('focused'); }
    }
}

function selectStockItem(color, type) {
    const cur = stockSlots[currentStockFocus];
    if (cur.color === color && cur.type === type) {
        stockSlots[currentStockFocus] = { color: null, type: null };
    } else {
        stockSlots[currentStockFocus] = { color, type };
    }
    document.getElementById('stock-matrix-wrapper').style.display = 'none';
    renderStockSlotsUI();
}

function calculateTotalStock() {
    const limit = RANK_LIMITS[document.getElementById('sys-level').value] || 3;
    let total = 0;
    for (let i = 0; i < limit; i++) { if (stockSlots[i].color && stockSlots[i].type) total++; }
    document.getElementById('lbl-total-stock').innerText = total;
    document.getElementById('lbl-max-stock').innerText = limit;
}

function resetAllStockSlots() {
    stockSlots = [
        { color: null, type: null }, { color: null, type: null }, { color: null, type: null },
        { color: null, type: null }, { color: null, type: null }, { color: null, type: null }
    ];
    document.getElementById('stock-matrix-wrapper').style.display = 'none';
    renderStockSlotsUI();
}

function processLevelTransition() {
    const limit = RANK_LIMITS[document.getElementById('sys-level').value] || 3;
    for (let i = limit; i < 6; i++) stockSlots[i] = { color: null, type: null };
    document.getElementById('stock-matrix-wrapper').style.display = 'none';
    renderStockSlotsUI();
}

function syncRetainedOres() {
    const advSyncArea = document.getElementById('adv-retained-sync-area');
    if(advSyncArea) advSyncArea.innerHTML = "<strong>スロット内引き継ぎ鉱石の状態同期:</strong>";

    for (let s = 1; s <= 3; s++) {
        const color = slotSelections[s].color;
        const type = slotSelections[s].type;
        const recipe = RECIPES[color][type];
        
        let expectedOres = [];
        if (color === 'green' && type === 'bracelet') {
            expectedOres = ['G', 'G', 'R', 'ALL'];
        } else {
            ['R', 'B', 'Y', 'G'].forEach(k => { for(let i=0; i<recipe[k]; i++) expectedOres.push(k); });
            for(let i=0; i<recipe.ALL; i++) expectedOres.push('ALL');
        }

        if (!retainedOresState[s] || retainedOresState[s].length !== expectedOres.length) {
            retainedOresState[s] = new Array(expectedOres.length).fill(false);
        }

        let oreButtonsHtml = "";
        expectedOres.forEach((ore, idx) => {
            if (ore === 'ALL') {
                let activeClass = retainedOresState[s][idx] ? " active-ALL" : "";
                oreButtonsHtml += `<div class="ore-square ore-all-style${activeClass}" onclick="toggleRetainedOreState(${s}, ${idx})"><span class="all-text">ALL</span></div>`;
            } else {
                let activeClass = retainedOresState[s][idx] ? ` active-${ore}` : "";
                oreButtonsHtml += `<div class="ore-square ore-${ore}${activeClass}" onclick="toggleRetainedOreState(${s}, ${idx})">${ore}</div>`;
            }
        });

        document.getElementById(`slot-retained-${s}`).innerHTML = oreButtonsHtml || `<span style="font-size:10px;color:#718096;">不要</span>`;
        
        if (advSyncArea) {
            let syncRow = `<div style="margin-top:2px;">スロット${s} [${COLOR_JA[color]}${TYPE_JA[type]}]: ${oreButtonsHtml || 'なし'}</div>`;
            advSyncArea.innerHTML += syncRow;
        }
    }
}

function toggleRetainedOreState(slot, idx) {
    retainedOresState[slot][idx] = !retainedOresState[slot][idx];
    syncRetainedOres();
}

function setTrainingFocus(idx) {
    currentTrainFocus = idx;
    for(let i=0; i<6; i++) document.getElementById(`tb-${i}`).classList.remove('focused');
    document.getElementById(`tb-${idx}`).classList.add('focused');
}

function handlePadInput(cmd) {
    if (['R', 'B', 'Y', 'G', 'N'].includes(cmd)) {
        trainingData[currentTrainFocus].push(cmd);
        const sortOrder = { 'R': 1, 'B': 2, 'Y': 3, 'G': 4, 'N': 5 };
        trainingData[currentTrainFocus].sort((a, b) => sortOrder[a] - sortOrder[b]);
        refreshTrainingDisplay(currentTrainFocus);
    } else if (cmd === 'DEL') {
        trainingData[currentTrainFocus].pop();
        refreshTrainingDisplay(currentTrainFocus);
    } else if (cmd === 'RESET') {
        trainingData[currentTrainFocus] = [];
        refreshTrainingDisplay(currentTrainFocus);
    } else if (cmd === 'ENTER') {
        if (currentTrainFocus < 5) setTrainingFocus(currentTrainFocus + 1);
    }
}

function refreshTrainingDisplay(idx) {
    const container = document.getElementById(`td-${idx}`);
    container.innerHTML = '';
    trainingData[idx].forEach(ore => {
        const chip = document.createElement('span');
        chip.className = `train-chip chip-${ore}`;
        chip.innerText = ore;
        container.appendChild(chip);
    });
}

function computePatternScore(s1, s2, s3, level) {
    const factor = { '見習い': 1, '三級': 2, '二級': 3, '一級': 4 }[level] || 0;
    const isK1 = s1.isCompleted && s1.type === 'kakashi' && s1.color !== 'gold';
    const isK2 = s2.isCompleted && s2.type === 'kakashi' && s2.color !== 'gold';
    const isK3 = s3.isCompleted && s3.type === 'kakashi' && s3.color !== 'gold';

    const fetchBase = (t, c) => c === 'gold' ? 10 : ({ 'ring': 1, 'charm': 2, 'bracelet': 3, 'necklace': 5 }[t] || 0);
    let b1 = s1.isCompleted ? fetchBase(s1.type, s1.color) : 0;
    let b2 = s2.isCompleted ? fetchBase(s2.type, s2.color) : 0;
    let b3 = s3.isCompleted ? fetchBase(s3.type, s3.color) : 0;

    let s1_calc = isK1 ? b1 : b1 * 2;
    let f1 = 0, f2 = 0, f3 = 0;

    if (!isK1 && !isK2 && !isK3) { f1 = s1_calc; f2 = b2; f3 = b3; }
    else if (isK1 && !isK2 && !isK3) { f2 = b2; f1 = f2 * 2; f3 = b3; }
    else if (!isK1 && isK2 && !isK3) { f1 = s1_calc; f3 = b3; f2 = f1 + f3; }
    else if (!isK1 && !isK2 && isK3) { f1 = s1_calc; f2 = b2; f3 = f2; }
    else if (isK1 && isK2 && !isK3) { f3 = b3; f2 = f3; f1 = f2 * 2; }
    else if (isK1 && !isK2 && isK3) { f2 = b2; f1 = f2 * 2; f3 = f2; }
    else if (!isK1 && isK2 && isK3) { f1 = s1_calc; f2 = f1; f3 = f2; }

    let activeItems = [];
    if (s1.isCompleted) activeItems.push(s1);
    if (s2.isCompleted) activeItems.push(s2);
    if (s3.isCompleted) activeItems.push(s3);

    let cBonus = 0, tBonus = 0;
    if (activeItems.length >= 2) {
        if (activeItems.length === 3) {
            if (activeItems[0].color === activeItems[1].color && activeItems[1].color === activeItems[2].color && activeItems[0].type === activeItems[1].type && activeItems[1].type === activeItems[2].type) { cBonus = factor; tBonus = factor; }
            else if ((activeItems[0].color === activeItems[1].color && activeItems[0].type === activeItems[1].type) || (activeItems[1].color === activeItems[2].color && activeItems[1].type === activeItems[2].type) || (activeItems[0].color === activeItems[2].color && activeItems[0].type === activeItems[2].type)) { cBonus = factor; tBonus = factor; }
            else {
                if (activeItems[0].color === activeItems[1].color || activeItems[1].color === activeItems[2].color || activeItems[0].color === activeItems[2].color) cBonus = factor;
                if (activeItems[0].type === activeItems[1].type || activeItems[1].type === activeItems[2].type || activeItems[0].type === activeItems[2].type) tBonus = factor;
            }
        } else {
            if (activeItems[0].color === activeItems[1].color && activeItems[0].type === activeItems[1].type) { cBonus = factor; tBonus = factor; }
            else {
                if (activeItems[0].color === activeItems[1].color) cBonus = factor;
                if (activeItems[0].type === activeItems[1].type) tBonus = factor;
            }
        }
    }
    return { total: (f1 + f2 + f3) + cBonus + tBonus, f1, f2, f3 };
}

// 【重要】スロットから取り外したアイテムも変換・別枠へ融通可能な拡張シミュレーションロジック
function executeAdvancedAnalysis() {
    const curScore = parseInt(document.getElementById('sys-cur-score').value) || 0;
    const tarScore = parseInt(document.getElementById('sys-tar-score').value) || 0;
    const allowOver = document.getElementById('sys-over-score').checked;
    const gap = tarScore - curScore;
    const lv = document.getElementById('sys-level').value;
    const limit = RANK_LIMITS[lv] || 3;

    // 1. 全体で利用可能な「アセットアイテム群」のプールを作成
    // スロットの初期アイテム3つ＋手持ストック上限枠を合算
    let itemPool = [];
    
    // スロット内アイテム(インデックス 0, 1, 2 としてマーク)
    itemPool.push({ origin: 'slot1', color: slotSelections[1].color, type: slotSelections[1].type });
    itemPool.push({ origin: 'slot2', color: slotSelections[2].color, type: slotSelections[2].type });
    itemPool.push({ origin: 'slot3', color: slotSelections[3].color, type: slotSelections[3].type });
    
    // 手持ちストックアイテム
    for (let i = 0; i < limit; i++) {
        if (stockSlots[i].color && stockSlots[i].type) {
            itemPool.push({ origin: `stock${i}`, color: stockSlots[i].color, type: stockSlots[i].type });
        }
    }

    advancedSolutions = [];

    // 2. プールの中から「新たにスロット1,2,3に配置する3つのアイテム」の全組み合わせを全探索
    const pLen = itemPool.length;
    for (let i = 0; i < pLen; i++) {
        for (let j = 0; j < pLen; j++) {
            if (i === j) continue;
            for (let k = 0; k < pLen; k++) {
                if (i === k || j === k) continue;

                // 選択された配置アイテム
                let activeSlots = [itemPool[i], itemPool[j], itemPool[k]];

                // 配置されずに「余った」アイテム。これらはすべて鉱石変換素材に回せる
                let unusedItems = [];
                for (let m = 0; m < pLen; m++) {
                    if (m !== i && m !== j && m !== k) {
                        unusedItems.push(itemPool[m]);
                    }
                }

                // 余ったアイテムから、実際にどのアイテムを鉱石にバラすかの全組み合わせ（べき集合）
                let uLen = unusedItems.length;
                let convCombos = [[]];
                for (let mask = 1; mask < (1 << uLen); mask++) {
                    let combo = [];
                    for (let m = 0; m < uLen; m++) {
                        if ((mask >> m) & 1) combo.push(unusedItems[m]);
                    }
                    convCombos.push(combo);
                }

                // 各変換パターンごとに処理
                for (let convList of convCombos) {
                    // 変換によって得られるカラー鉱石ボーナス
                    let cBonus = { R: 0, B: 0, Y: 0, G: 0 };
                    convList.forEach(item => {
                        if (item.color === 'gold') { cBonus.R++; cBonus.B++; cBonus.Y++; cBonus.G++; }
                        else if (item.color === 'red') cBonus.R++;
                        else if (item.color === 'blue') cBonus.B++;
                        else if (item.color === 'yellow') cBonus.Y++;
                        else if (item.color === 'green') cBonus.G++;
                    });

                    // 6つの訓練の分布をそれぞれ検証
                    for (let t = 0; t < 6; t++) {
                        let tOres = trainingData[t];
                        let tCounts = { R: 0, B: 0, Y: 0, G: 0, N: 0 };
                        tOres.forEach(o => tCounts[o]++);

                        let compFlags = [false, false, false];

                        // スロット1〜3の達成検証
                        for (let s = 0; s < 3; s++) {
                            const item = activeSlots[s];
                            const rec = RECIPES[item.color][item.type];
                            
                            // 基本プール = 変換鉱石 + 訓練獲得鉱石
                            let pool = { 
                                R: cBonus.R + tCounts.R, 
                                B: cBonus.B + tCounts.B, 
                                Y: cBonus.Y + tCounts.Y, 
                                G: cBonus.G + tCounts.G, 
                                N: tCounts.N 
                            };
                            
                            // 【重要条件】もしスロット(s+1)のアイテムが「動かされずそのままであった」場合のみ、
                            // 既存の保持引き継ぎ鉱石をそのまま合算して使用できる
                            if ((s === 0 && item.origin === 'slot1') || 
                                (s === 1 && item.origin === 'slot2') || 
                                (s === 2 && item.origin === 'slot3')) {
                                
                                const states = retainedOresState[s + 1] || [];
                                const origRec = RECIPES[slotSelections[s + 1].color][slotSelections[s + 1].type];
                                let origList = [];
                                if (slotSelections[s + 1].color === 'green' && slotSelections[s + 1].type === 'bracelet') {
                                    origList = ['G', 'G', 'R', 'ALL'];
                                } else {
                                    ['R', 'B', 'Y', 'G'].forEach(k => { for(let n=0; n<origRec[k]; n++) origList.push(k); });
                                    for(let n=0; n<origRec.ALL; n++) origList.push('ALL');
                                }
                                
                                states.forEach((act, oIdx) => {
                                    if (act && oIdx < origList.length) {
                                        let type = origList[oIdx];
                                        if (type === 'ALL') pool.N++; else pool[type]++;
                                    }
                                });
                            }

                            // 必要数チェック
                            let dR = pool.R - rec.R; 
                            let dB = pool.B - rec.B; 
                            let dY = pool.Y - rec.Y; 
                            let dG = pool.G - rec.G;
                            if (dR >= 0 && dB >= 0 && dY >= 0 && dG >= 0) {
                                if ((dR + dB + dY + dG + pool.N) >= rec.ALL) compFlags[s] = true;
                            }
                        }

                        // スコア計算
                        let scoreRes = computePatternScore(
                            { color: activeSlots[0].color, type: activeSlots[0].type, isCompleted: compFlags[0] },
                            { color: activeSlots[1].color, type: activeSlots[1].type, isCompleted: compFlags[1] },
                            { color: activeSlots[2].color, type: activeSlots[2].type, isCompleted: compFlags[2] },
                            lv
                        );

                        let valid = allowOver ? (scoreRes.total > 0) : (scoreRes.total === gap);
                        if (valid) {
                            advancedSolutions.push({ 
                                activeSlots, 
                                converts: convList, 
                                trainIdx: t, 
                                trainName: TRAIN_LABELS[t], 
                                scoreRes, 
                                compFlags 
                            });
                        }
                    }
                }
            }
        }
    }
    renderAdvancedResults();
}

function toggleSortOrder() {
    sortOrderDesc = !sortOrderDesc;
    document.getElementById('btn-toggle-sort').innerText = sortOrderDesc ? "昇順/訓練順に戻す" : "降順にする";
    renderAdvancedResults();
}

function renderAdvancedResults() {
    const curScore = parseInt(document.getElementById('sys-cur-score').value) || 0;
    const tarScore = parseInt(document.getElementById('sys-tar-score').value) || 0;
    const gap = tarScore - curScore;

    // 重複解を整理
    let uniqueMap = new Map();
    advancedSolutions.forEach(sol => {
        let key = `${sol.trainIdx}_${sol.scoreRes.total}_` + 
                  sol.activeSlots.map(a => `${a.color[0]}${a.type[0]}`).join('') + `_` +
                  sol.compFlags.map(f => f?'1':'0').join('') + `_` +
                  sol.converts.map(c => `${c.color[0]}${c.type[0]}`).sort().join('');
        if(!uniqueMap.has(key)) uniqueMap.set(key, sol);
    });
    let filteredSolutions = Array.from(uniqueMap.values());

    filteredSolutions.sort((a, b) => {
        const aMatch = a.scoreRes.total === gap;
        const bMatch = b.scoreRes.total === gap;
        
        if (aMatch && !bMatch) return sortOrderDesc ? 1 : -1;
        if (!aMatch && bMatch) return sortOrderDesc ? -1 : 1;
        
        if (aMatch && bMatch) {
            return sortOrderDesc ? b.trainIdx - a.trainIdx : a.trainIdx - b.trainIdx;
        } else {
            return sortOrderDesc ? b.scoreRes.total - a.scoreRes.total : a.scoreRes.total - b.scoreRes.total;
        }
    });

    // グローバル退避
    advancedSolutions = filteredSolutions;

    const out = document.getElementById('advanced-results');
    if (advancedSolutions.length === 0) {
        out.innerHTML = `<span style="color:#ff3b30;">条件を満たすシミュレーションルートは存在しません。</span>`;
        return;
    }

    let html = `<div style="font-weight:bold; margin-bottom:6px;">有効判定ルート: ${advancedSolutions.length} 件 (クリックで詳細展開)</div>`;
    advancedSolutions.slice(0, 40).forEach((sol, i) => {
        let itemStatusHtml = [];
        for(let s=0; s<3; s++) {
            const item = sol.activeSlots[s];
            const compMark = sol.compFlags[s] ? '○' : '×';
            itemStatusHtml.push(`スロット${s+1}: <span class="text-${item.color}"><strong>${COLOR_JA[item.color]}の${TYPE_JA[item.type]}</strong></span> (${compMark})`);
        }

        html += `<div class="result-row-item" onclick="renderFlowchart(${i})">` +
                `<strong>ルート ${i+1}: 獲得 +${sol.scoreRes.total} pts (${sol.trainName})</strong><br>` +
                `<div style="font-size:11px; margin-top:2px; line-height:1.4;">${itemStatusHtml.join(' | ')}</div></div>`;
    });
    out.innerHTML = html;
}

function renderFlowchart(idx) {
    const sol = advancedSolutions[idx];
    const target = document.getElementById('flowchart-output');
    
    let html = `<div class="flow-container"><h4 style="margin:0 0 8px 0; font-size:12px;">【指図書ルート ${idx+1} の詳細手順】</h4>`;
    let step = 1;
    
    // 手順1: 配置転換
    let moveNotes = [];
    for(let s=0; s<3; s++) {
        const item = sol.activeSlots[s];
        const origLabel = (item.origin === `slot${s+1}`) ? null : 
                          (item.origin.startsWith('slot') ? `スロット${item.origin.slice(-1)}の既存品` : `ストック枠のアイテム`);
        if(origLabel) {
            moveNotes.push(`スロット${s+1}へ、${origLabel}であった <span class="text-${item.color}"><strong>${COLOR_JA[item.color]}の${TYPE_JA[item.type]}</strong></span> をセットする`);
        }
    }
    if(moveNotes.length > 0) {
        moveNotes.forEach(n => { html += `<div>${step}. ${n}</div>`; step++; });
    } else {
        html += `<div style="opacity:0.65;">${step}. （各スロットのアイテム配置変更は不要です）</div>`; step++;
    }

    // 手順2: 取り外した余剰枠の鉱石一括分解
    if(sol.converts.length > 0) {
        let items = sol.converts.map(c => {
            let src = c.origin.startsWith('slot') ? `(スロット${c.origin.slice(-1)}の取外品)` : `(ストック)`;
            return `<span class="text-${c.color}"><strong>${COLOR_JA[c.color]}の${TYPE_JA[c.type]}</strong></span>${src}`;
        }).join(', ');
        html += `<div>${step}. 余剰となった ${items} をすべて素材鉱石へ一括変換（分解）する</div>`; step++;
    } else {
        html += `<div style="opacity:0.65;">${step}. （アイテムの鉱石分解操作は不要です）</div>`; step++;
    }

    // 手順3: 訓練
    html += `<div>${step}. 訓練<strong>「${sol.trainName}」</strong>を実行し、出現する鉱石群をすべて回収する</div>`; step++;

    // 結末 (黒太文字の統一指定)
    let comps = [];
    for(let s=0; s<3; s++) {
        const item = sol.activeSlots[s];
        if(sol.compFlags[s]) comps.push(`${COLOR_JA[item.color]}の${TYPE_JA[item.type]}`);
    }
    let resultText = comps.length > 0 ? `${comps.join('、')}が完成。` : "完成したアイテムはありません。";
    
    html += `<div class="flow-final-result">➔ 結果: ${resultText} 計 +${sol.scoreRes.total} pts が加算されます。</div></div>`;
    
    target.innerHTML = html;
    target.scrollIntoView({ behavior: 'smooth' });
}

initSystem();
</script>
